<?xml version="1.0" encoding="UTF-8"?>
<!-- ═══════════════════════════════════════════════════════════════════
     SRX VISUALS — BUSINESS CARD BACK
     Canvas:  3.75" × 2.25" at 300 dpi = 1125 × 675 px  (includes bleed)
     Trim:    3.5"  × 2"    at 300 dpi = offset 37.5 px from each edge
     Safety:  3.25" × 1.75" at 300 dpi = offset 75 px from each edge
     Colors:  All black = #000000 (C0 M0 Y0 K100). White = #ffffff.
              For rich black backgrounds use C40 M30 Y30 K100 in Illustrator.
     Export:  PDF Print, CMYK. Remove the GUIDES group before uploading.
     ═══════════════════════════════════════════════════════════════════ -->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1125 675"
     width="1125" height="675">
  <title>SRX Visuals Business Card — BACK</title>
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;700&family=JetBrains+Mono:wght@400&display=swap');
    ]]></style>
  </defs>

  <!-- ── FULL-BLEED BACKGROUND ── -->
  <rect width="1125" height="675" fill="#000000"/>

  <!-- Subtle grid texture (very faint) -->
  <line x1="0" y1="337.5" x2="1125" y2="337.5" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="562.5" y1="0" x2="562.5" y2="675" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>

  <!-- ══════════════════════════════════════════════
       DESIGN CONTENT — centered on card
       ══════════════════════════════════════════════ -->

  <!-- Viewfinder mark (70×70) centered on card -->
  <g transform="translate(527, 222)"
     stroke="#ffffff" stroke-width="2.4" fill="none" stroke-linecap="square">
    <path d="M0,20 L0,0 L20,0"/>
    <path d="M50,0 L70,0 L70,20"/>
    <path d="M70,50 L70,70 L50,70"/>
    <path d="M20,70 L0,70 L0,50"/>
    <circle cx="35" cy="35" r="12.5"/>
    <circle cx="35" cy="35" r="3.2" fill="#ffffff" stroke="none"/>
  </g>

  <!-- SRX wordmark — centered below mark -->
  <!-- Vertical rule between mark and text (subtle) -->
  <line x1="562" y1="305" x2="562" y2="330"
    stroke="#ffffff" stroke-width="0.6" opacity="0.3"/>

  <!-- "SRX" -->
  <text x="562" y="390"
    font-family="'Saira Condensed','Arial Narrow',sans-serif"
    font-weight="700" font-size="76"
    fill="#ffffff" letter-spacing="10"
    text-anchor="middle">SRX</text>

  <!-- "VISUALS" -->
  <text x="562" y="425"
    font-family="'JetBrains Mono','Courier New',monospace"
    font-weight="400" font-size="18"
    fill="#ffffff" fill-opacity="0.45"
    letter-spacing="11"
    text-anchor="middle">VISUALS</text>

  <!-- Thin rule -->
  <line x1="362" y1="448" x2="762" y2="448"
    stroke="#ffffff" stroke-width="0.7" opacity="0.18"/>

  <!-- Motto -->
  <text x="562" y="486"
    font-family="Georgia,'Times New Roman',serif"
    font-style="italic" font-size="22"
    fill="#ffffff" fill-opacity="0.48"
    text-anchor="middle">Trained to compete. Built to capture.</text>

  <!-- Website — bottom center, small -->
  <text x="562" y="563"
    font-family="'JetBrains Mono','Courier New',monospace"
    font-size="18" fill="#ffffff" fill-opacity="0.28"
    letter-spacing="4"
    text-anchor="middle">SRXVISUALS.COM</text>

  <!-- ══════════════════════════════════════════════
       GUIDES GROUP — DELETE THIS ENTIRE GROUP BEFORE PRINTING
       ══════════════════════════════════════════════ -->
  <g id="guides" opacity="1">
    <!-- Trim line (blue dashed) -->
    <rect x="37.5" y="37.5" width="1050" height="600"
      fill="none" stroke="#0077ff" stroke-width="1.5" stroke-dasharray="9,4" opacity="0.75"/>
    <!-- Safety line (green dashed) -->
    <rect x="75" y="75" width="975" height="525"
      fill="none" stroke="#00cc44" stroke-width="1" stroke-dasharray="5,5" opacity="0.55"/>
    <!-- Labels -->
    <text x="40" y="25"
      font-family="'Courier New',monospace" font-size="15"
      fill="#0077ff" opacity="0.95">BACK — TRIM 3.5"×2" | 300 DPI | CMYK | Bleed canvas: 3.75"×2.25" — REMOVE GUIDES BEFORE PRINT</text>
    <text x="78" y="62"
      font-family="'Courier New',monospace" font-size="12"
      fill="#00cc44" opacity="0.8">SAFETY</text>
    <!-- Corner crop marks -->
    <line x1="0" y1="37.5" x2="25" y2="37.5" stroke="#0077ff" stroke-width="1" opacity="0.6"/>
    <line x1="37.5" y1="0" x2="37.5" y2="25" stroke="#0077ff" stroke-width="1" opacity="0.6"/>
    <line x1="1100" y1="37.5" x2="1125" y2="37.5" stroke="#0077ff" stroke-width="1" opacity="0.6"/>
    <line x1="1087.5" y1="0" x2="1087.5" y2="25" stroke="#0077ff" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="637.5" x2="25" y2="637.5" stroke="#0077ff" stroke-width="1" opacity="0.6"/>
    <line x1="37.5" y1="650" x2="37.5" y2="675" stroke="#0077ff" stroke-width="1" opacity="0.6"/>
    <line x1="1100" y1="637.5" x2="1125" y2="637.5" stroke="#0077ff" stroke-width="1" opacity="0.6"/>
    <line x1="1087.5" y1="650" x2="1087.5" y2="675" stroke="#0077ff" stroke-width="1" opacity="0.6"/>
  </g>

</svg>
