<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 96" width="80" height="96" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
    </style>
  </defs>

  <!-- Mark, 40×40, centered horizontally in 80px -->
  <g transform="translate(20,0)" stroke="#ffffff" stroke-width="2.5" stroke-linecap="square" fill="none">
    <polyline points="0,11 0,0 11,0"/>
    <polyline points="29,0 40,0 40,11"/>
    <polyline points="0,29 0,40 11,40"/>
    <polyline points="29,40 40,40 40,29"/>
    <circle cx="20" cy="20" r="8.5" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="2.5" fill="#ffffff" stroke="none"/>
  </g>

  <!-- Horizontal rule -->
  <line x1="0" y1="52" x2="80" y2="52" stroke="#ffffff" stroke-width="0.75" opacity="0.2"/>

  <!-- SRX -->
  <text x="40" y="76"
    font-family="'Saira Condensed', 'Arial Narrow', sans-serif"
    font-size="34" font-weight="500"
    fill="#ffffff" letter-spacing="3"
    text-anchor="middle">SRX</text>

  <!-- VISUALS -->
  <text x="40" y="90"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="8.5" font-weight="400"
    fill="rgba(255,255,255,0.5)" letter-spacing="4"
    text-anchor="middle">VISUALS</text>
</svg>
